---
- name: Gather SELinux facts
  ansible.builtin.setup:
    gather_subset:
      - '!all'
      - '!min'
      - selinux

- name: Install system dependencies
  ansible.builtin.dnf:
    name:
      - git
      - nginx
      - policycoreutils-python-utils
    state: present

- name: Clone Lighthouse repository
  ansible.builtin.git:
    repo: "{{ lighthouse_repo }}"
    dest: "{{ lighthouse_dir }}"
    version: "{{ lighthouse_version }}"
    force: true

- name: Configure Nginx for Lighthouse
  ansible.builtin.template:
    src: lighthouse_nginx.conf.j2
    dest: "{{ nginx_conf_dir }}/lighthouse.conf"
    mode: '0644'
  notify: restart nginx

- name: Set SELinux context for Lighthouse files
  ansible.builtin.shell:
    cmd: "chcon -R -t {{ lighthouse_selinux_context }} {{ lighthouse_dir }}"
  when: ansible_selinux.status == "enabled"
  changed_when: false

- name: Set SELinux boolean for httpd
  ansible.builtin.seboolean:
    name: "{{ lighthouse_selinux_boolean }}"
    state: true
    persistent: true
  when: ansible_selinux.status == "enabled"

- name: Start and enable Nginx
  ansible.builtin.systemd:
    name: nginx
    state: started
    enabled: true
